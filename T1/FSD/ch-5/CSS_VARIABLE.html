<html>
  <head>
    <title>CSS Variable Example</title>
    <style>
      :root {
        --main-bg-color: rgb(0, 132, 248);
        --main-text-color: rgb(0, 9, 93);
        --main-padding: 20px;
      }
      .container {
        background-color: var(--main-bg-color);
        color: var(--main-text-color);
        padding: var(--main-padding);
        text-align: center;
      }
      .button {
        background-color: var(--main-text-color);
        color: var(--main-bg-color);
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      }
      .button:hover {
        background-color: rgb(102, 158, 207);
        color: rgb(0, 0, 0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to CSS Variables</h1>
      <p>This container uses CSS variables for styling.</p>
      <button class="button">Click Me</button>
    </div> 
      web page. Hover over the boxes to see the transition effects in action.
</html>
