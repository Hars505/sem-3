<html>
  <head>
    <title>Form</title>
  </head>
  <body style="background-color: #f5f5dc">
    <form action="hiii.txt" method="post" align="Left" style="font-size: 20px">
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <h1 align="center" style="color: rgb(191, 95, 11)">Registration Form</h1>
      <hr label="fill details" style="border: 2px solid black" />
      <fieldset style="width: 35%; background-color: #d8d8a5">
        <legend>Information</legend>
        UserName:
        <input
          type="text"
          placeholder="Enter Name"
          name="User name"
          id="10125"
          maxlength="25"
          required
          autofocus
        /><br /><br />
        Password:
        <input
          type="password"
          name="password"
          placeholder="Enter Password Eg-NSVU1165"
          maxlength="25"
          minlength="8"
          required
          autocomplete=""
        /><br /><br />
        Email:
        <input
          type="text"
          placeholder="Enter Email"
          osrnv
          name="email"
          minlength="10"
          maxlength="50"
          required
        /><br /><br />
        Phone:
        <input
          type="tel"
          placeholder="Enter Phone Number"
          name="phone"
          title="Phone number format: 123-456-7890"
        /><br /><br />
        Gender:
        <input type="radio" name="Gender" value="male" />Male
        <input type="radio" name="Gender" value="female" />Female
        <br />
        <br />
        Hobbies:
        <input type="checkbox" name="Music" value="MUSIC" />Music
        <input type="checkbox" name="SPORT" value="SPORT" />Sport
      </fieldset>
      <fieldset style="width: 35%; background-color: #d8d8a5">
        <legend>Additional Information</legend>
        DOB:
        <input
          type="date"
          name="bday"
          id="bday"
          value="2025-06-15"
          min="1990-01-01"
          max="2024-12-31"
        /><br /><br />
        Age:
        <input
          type="number"
          name="age"
          min="18"
          this.value="bday.value"
          disabled
        /><br /><br />
        FAV Color:
        <input
          type="color"
          id="favcolor"
          name="favcolor"
          value="E1B35D"
        /><br /><br />
        Preffered Browser:
        <input list="browsers" name="browser" id="brow" />
        <datalist id="browsers">
          <option value="Chrome" />
          <option value="Firefox" />
          <option value="Safari" />
          <option value="Opera" />
          <option value="Edge" />
        </datalist>
        Branch:
        <select name="branch" id="branch">
          <option value=" " selected disabled hidden>Select Department</option>
          <optgroup label="Engineering">
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="IT">IT</option>
            <option value="MECH">MECH</option>
            <option value="AIML">AIML</option>
            <option value="CIVIL">CIVIL</option>
            <option value="CHEMICAL">CHEMICAL</option>
          </optgroup>
        </select>
        <br /><br />
      </fieldset>
      <fieldset style="width: 35%; background-color: #d8d8a5">
        <legend>Feedback</legend>
        Feedback:
        <textarea
          name="Feedback"
          id="Feedback"
          cols="20"
          rows="2"
          placeholder="Enter Feedback"
        ></textarea>
        Satisfaction Level:
        <input
          type="range"
          name="Satisfaction Level"
          id="points"
          min="0"
          max="50"
          step="1"
          value="25"
        />
      </fieldset>
      <fieldset style="width: 35%; background-color: #d8d8a5  ">
        <legend>Submit Section</legend>
        <input
          type="reset"
          value="Reset Form"
          onclick="alert('Form Resseted Successfully')"
        />
        <input
          type="submit"
          value="Submit Form"
          onclick="alert('Form Submitted Successfully')"
        />
        <input
          type="button"
          value="Click Me"
          onclick="alert(' Im Feeling Lucky')"
        />
      </fieldset>
    </form>
  </body>
</html>
