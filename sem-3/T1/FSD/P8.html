<html>
  <head>
    <title>Table proprties</title>
  </head>
  <body bgcolor="#aa6c3a" ; font-family="Segoe UI, Arial, sans-serif" ;>
    <table
      border="2"
      cellpadding="10"
      cellspacing="4"
      bgcolor="#C4A484"
      width="400"
      height="300"
      fontsize="28"
    >
      <tr>
        <td colspan="2" align="center">BLue</td>
        <td rowspan="2" align="center">Yellow</td>
      </tr>
      <tr>
        <td rowspan="2" align="center">Cyan</td>
        <td align="center">Red</td>
      </tr>
      <tr>
        <td colspan="2" align="center">Green</td>
      </tr>
    </table>
  </body>
</html>
