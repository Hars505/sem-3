<html>
    <head>
        <title>CSS MEDIA QUERIES</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                transition: background-color 0.5s, font-size 0.5s;
                background-color: lightblue;
            }
            @media (max-width: 600px) {
                body {
                    background-color: lightblue;
                    font-size: 16px;
                }
            } 
            @media only screen and (min-width: 500px) and (max-width: 1024px) {
                body {
                    background-color: lightgreen;
                    font-size: 18px;
                }
            }
            @media not(orientation: landscape) {
                body {
                    background-color: lightcoral;
                    font-size: 20px;
                }
            }
            @media screen and (max-width: 500px){
                body {
                    background-color: rgb(250, 250, 108);
                    font-size: 14px;
                }
                
            }
        </style>
    </head>
    <body>
        <h1>CSS Media Queries Example</h1>
        <p>Resize the browser window to see the background color and font size change based on different screen sizes and orientations.</p>
    </body>
</html>
