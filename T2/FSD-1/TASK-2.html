<!-- writea css to get following format :
text colour green 
paragraph 2cm length 
font style ariel
font style italic -->
<html>
    <head>
        <title>CSS Formatting Example</title>
        <style>
            p {
                color: green;
                font-family: Arial, sans-serif;
                font-style: italic;
                text-indent: 32px;
            }
            P:active {
                color: rgb(158, 91, 53);
                font-size: 40px;
                transform: rotatex(180deg);
                transition-duration: 2s;
            }
        </style>
    </head>
    <body style="background-color: bisque;">
        <p>THIS IS AN EXAMPLE</p>        
    </body>
</html>
